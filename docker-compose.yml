version: '3.8'

services:
  # Spring Boot Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # This tells the Java container to look for Ollama on Windows host machine
      - OLLAMA_URL=http://host.docker.internal:11434
    networks:
      - app-network

  # React/Vite Frontend Service
  frontend:
    build:
      context: ./resume-ai-optimizer-ui
      dockerfile: Dockerfile
    ports:
      # Maps your machine's port 5173 to the container's Nginx port 80
      - "5173:80"
    depends_on:
      - backend
    networks:
      - app-network

# Shared Internal Network
networks:
  app-network:
    driver: bridge
